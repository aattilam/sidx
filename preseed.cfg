#_preseed_V1
#### Contents of the preconfiguration file (for sid)

### Network configuration

d-i netcfg/get_hostname string unassigned-hostname
d-i netcfg/get_domain string unassigned-domain

d-i netcfg/hostname string sidx

d-i netcfg/wireless_wep string

### Mirror settings

d-i mirror/protocol string http
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

d-i mirror/suite string sid
d-i mirror/udeb/suite string sid

### Account setup

d-i passwd/root-login boolean false
d-i passwd/make-user boolean false

### Clock and time zone setup

d-i clock-setup/ntp boolean true

### Apt setup

d-i apt-setup/multiarch string i386

d-i apt-setup/services-select multiselect security, updates, sid

d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

d-i apt-setup/local0/repository string http://deb.debian.org/debian stable main contrib non-free
d-i apt-setup/local0/comment string Debian Stable

d-i apt-setup/local1/repository string http://deb.debian.org/debian-security/ stable-security main contrib non-free
d-i apt-setup/local1/comment string Debian Stable Security

d-i apt-setup/local2/repository string http://deb.debian.org/debian stable-updates main contrib non-free
d-i apt-setup/local2/comment string Debian Stable Updates

d-i apt-setup/local3/repository string http://deb.debian.org/debian testing main contrib non-free non-free-firmware
d-i apt-setup/local3/comment string Debian Testing

d-i apt-setup/local4/repository string http://deb.debian.org/debian sid main contrib non-free non-free-firmware
d-i apt-setup/local4/comment string Debian Sid

d-i apt-setup/local0/pin string
d-i apt-setup/local0/comment string Debian Sid
d-i apt-setup/local0/priority string 100
d-i apt-setup/local0/repository string http://deb.debian.org/debian sid main contrib non-free non-free-firmware

d-i apt-setup/local1/pin string
d-i apt-setup/local1/comment string Debian Testing
d-i apt-setup/local1/priority string 90
d-i apt-setup/local1/repository string http://deb.debian.org/debian testing main contrib non-free non-free-firmware

d-i apt-setup/local2/pin string
d-i apt-setup/local2/comment string Debian Stable
d-i apt-setup/local2/priority string 80
d-i apt-setup/local2/repository string http://deb.debian.org/debian stable main contrib non-free

### Package selection

d-i pkgsel/run_tasksel boolean false

d-i pkgsel/include string gnome-core libreoffice libreoffice-gnome gnome-tweaks timeshift neofetch htop gnome-boxes gnome-initial-setup dconf-cli dirmngr libglib2.0-dev software-properties-gtk flatpak network-manager gnome-software-plugin-flatpak chrome-gnome-shell intel-microcode amd64-microcode git nala qgnomeplatform-qt5 adwaita-qt adwaita-qt6 firmware-linux-nonfree firefox fonts-crosextra-carlito fonts-crosextra-caladea firmware-misc-nonfree ttf-mscorefonts-installer rar unrar libavcodec-extra gstreamer1.0-libav gstreamer1.0-plugins-ugly ffmpeg gstreamer1.0-vaapi winetricks wine wine32 wine64 libwine libwine:i386 fonts-wine curl laptop-detect gnupg gnupg2 apt-transport-https ca-certificates

### Boot loader installation

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

#### Advanced options

d-i preseed/late_command string \
    in-target apt-get update; \
    in-target apt-get install -y wget; \
    in-target wget -O /tmp/script.sh https://raw.githubusercontent.com/aattilam/sidx/main/preseed-postinst.sh; \
    in-target chmod +x /tmp/script.sh; \
    in-target /tmp/script.sh
